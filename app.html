<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Tools Reference</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#080a12;--s1:#0f1120;--s2:#161829;--s3:#1d2038;
  --border:#252840;--border2:#2e3150;
  --text:#dde0f5;--muted:#6068a0;--dim:#888eb8;
  --purple:#8b72ff;--blue:#4da6ff;--green:#36d98c;
  --pink:#e060b0;--orange:#f09030;--teal:#30d0c0;
  --font:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;
  --mono:'SF Mono','Fira Code','Cascadia Code',monospace;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--font)}
body{display:flex;flex-direction:column;min-height:100vh}

/* scrollbar */
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:var(--s1)}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}

/* ── HEADER ── */
.header{
  padding:24px 32px 20px;
  background:linear-gradient(180deg,rgba(139,114,255,.08) 0%,transparent 100%);
  border-bottom:1px solid var(--border);
}
.header-top{display:flex;align-items:center;gap:16px;margin-bottom:20px}
.logo{font-size:22px;font-weight:800;letter-spacing:-.5px;background:linear-gradient(135deg,var(--purple),var(--blue));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.header-sub{font-size:13px;color:var(--muted);flex:1}
.search-box{
  display:flex;align-items:center;gap:8px;
  background:var(--s2);border:1px solid var(--border2);border-radius:10px;
  padding:8px 12px;width:280px;
}
.search-box input{background:none;border:none;color:var(--text);font-size:13px;outline:none;flex:1}
.search-box input::placeholder{color:var(--muted)}
.search-box .icon{color:var(--muted);font-size:14px}

/* ── STAT CARDS ── */
.stat-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.stat-card{
  background:var(--s2);border:1px solid var(--border);border-radius:12px;
  padding:14px 16px;cursor:pointer;transition:all .2s;position:relative;overflow:hidden;
}
.stat-card::before{
  content:'';position:absolute;inset:0;opacity:0;transition:opacity .2s;
  background:linear-gradient(135deg,var(--c1,.3) 0%,transparent 60%);
}
.stat-card:hover{border-color:var(--border2);transform:translateY(-1px)}
.stat-card:hover::before{opacity:1}
.stat-card.active{border-color:var(--c1);background:rgba(0,0,0,.2)}
.stat-card.active::before{opacity:.3}
.stat-num{font-size:32px;font-weight:800;line-height:1;margin-bottom:4px;color:var(--c1)}
.stat-label{font-size:12px;color:var(--muted);font-weight:500;text-transform:uppercase;letter-spacing:.06em}
.stat-icon{position:absolute;right:14px;top:14px;font-size:22px;opacity:.4}

/* ── MAIN ── */
.main{flex:1;padding:24px 32px;overflow-y:auto}

/* ── SECTION VIEWS ── */
.section{display:none}
.section.active{display:block}

/* ── TOOL GRID ── */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(360px,1fr));gap:14px}

/* ── TOOL CARD ── */
.card{
  background:var(--s1);border:1px solid var(--border);border-radius:14px;
  overflow:hidden;cursor:pointer;transition:border-color .15s,box-shadow .15s;
}
.card:hover{border-color:var(--border2);box-shadow:0 6px 24px rgba(0,0,0,.4)}
.card.open{border-color:var(--purple)}
.card-top{display:flex;gap:12px;padding:16px;align-items:flex-start}
.card-icon{
  width:40px;height:40px;border-radius:10px;background:var(--s3);
  display:flex;align-items:center;justify-content:center;font-size:19px;flex-shrink:0;
}
.card-meta{flex:1;min-width:0}
.card-name{font-size:14px;font-weight:600;margin-bottom:6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.chips{display:flex;gap:5px;flex-wrap:wrap}
.chip{font-size:10px;padding:2px 8px;border-radius:5px;font-weight:600;white-space:nowrap}
.c-cat{background:rgba(77,166,255,.12);color:var(--blue);border:1px solid rgba(77,166,255,.2)}
.c-type{background:rgba(48,208,192,.1);color:var(--teal);border:1px solid rgba(48,208,192,.2)}
.c-status{background:rgba(54,217,140,.1);color:var(--green);border:1px solid rgba(54,217,140,.2)}
.c-content{background:rgba(240,144,48,.12);color:var(--orange);border:1px solid rgba(240,144,48,.25)}
.card-desc{padding:0 16px 14px;font-size:12.5px;color:var(--dim);line-height:1.6}

.card-body{
  border-top:1px solid var(--border);padding:14px 16px;
  display:none;flex-direction:column;gap:12px;
}
.card.open .card-body{display:flex}

.install-box{
  background:var(--bg);border:1px solid var(--border2);border-radius:8px;
  padding:9px 12px;display:flex;align-items:center;gap:8px;
}
.install-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;flex-shrink:0}
.install-cmd{font-family:var(--mono);font-size:12px;color:#7ef5a0;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.copy-btn{background:none;border:1px solid var(--border2);border-radius:5px;color:var(--muted);cursor:pointer;font-size:11px;padding:3px 7px;transition:all .12s}
.copy-btn:hover{border-color:var(--purple);color:var(--purple)}

.detail-label{font-size:10px;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);font-weight:600;margin-bottom:6px}
.use-cases{list-style:none}
.use-cases li{font-size:12.5px;color:var(--dim);padding:3px 0 3px 14px;position:relative;line-height:1.4}
.use-cases li::before{content:'▸';position:absolute;left:0;color:var(--muted);font-size:10px;top:5px}
.tag-row{display:flex;flex-wrap:wrap;gap:5px}
.tag{background:var(--s3);border-radius:4px;color:var(--muted);font-size:11px;padding:2px 8px}
.works-chip{background:rgba(77,166,255,.1);border-radius:4px;color:var(--blue);font-size:11px;padding:2px 8px}
.card-link{color:var(--blue);font-size:12px;text-decoration:none;display:block;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.card-link:hover{text-decoration:underline}
.notes-box{background:rgba(240,144,48,.06);border:1px solid rgba(240,144,48,.2);border-radius:6px;padding:8px 10px;font-size:12px;color:var(--orange)}
.transcript-link{
  display:flex;align-items:center;gap:8px;
  background:rgba(139,114,255,.08);border:1px solid rgba(139,114,255,.2);border-radius:8px;
  padding:9px 12px;cursor:pointer;font-size:12.5px;color:var(--purple);transition:all .15s;
}
.transcript-link:hover{background:rgba(139,114,255,.14);border-color:var(--purple)}

/* ── TRANSCRIPT LIST ── */
.t-list{display:flex;flex-direction:column;gap:10px}
.t-item{
  background:var(--s1);border:1px solid var(--border);border-radius:12px;
  padding:14px 18px;cursor:pointer;transition:border-color .15s;display:flex;align-items:center;gap:14px;
}
.t-item:hover{border-color:var(--border2)}
.t-dot{width:8px;height:8px;border-radius:50%;background:var(--purple);flex-shrink:0}
.t-info{flex:1;min-width:0}
.t-title{font-size:13px;font-weight:500;margin-bottom:3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.t-sub{font-size:11.5px;color:var(--muted)}
.t-badge{font-size:11px;color:var(--dim);background:var(--s3);padding:3px 10px;border-radius:10px;white-space:nowrap;flex-shrink:0}

/* ── SCREENSHOT GRID ── */
.ss-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px}
.ss-card{
  background:var(--s1);border:1px solid var(--border);border-radius:10px;
  overflow:hidden;cursor:pointer;transition:border-color .15s;
}
.ss-card:hover{border-color:var(--border2)}
.ss-card img{width:100%;aspect-ratio:16/9;object-fit:cover;display:block;background:var(--s2)}
.ss-name{font-size:10.5px;color:var(--muted);padding:8px 10px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* ── PANEL (transcript reader) ── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;display:none;place-items:center}
.overlay.open{display:grid}
.panel{
  background:var(--s1);border:1px solid var(--border2);border-radius:18px;
  width:min(700px,95vw);max-height:88vh;display:flex;flex-direction:column;
  box-shadow:0 32px 80px rgba(0,0,0,.6);
}
.panel-head{padding:18px 22px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px}
.panel-icon{font-size:18px}
.panel-title{flex:1;font-size:14px;font-weight:600}
.panel-close{background:var(--s3);border:1px solid var(--border);border-radius:7px;color:var(--muted);cursor:pointer;font-size:16px;padding:4px 10px;transition:all .12s}
.panel-close:hover{color:var(--text);border-color:var(--border2)}
.panel-meta{padding:14px 22px;border-bottom:1px solid var(--border);display:flex;gap:8px;flex-wrap:wrap}
.panel-body{padding:20px 22px;overflow-y:auto;flex:1}
.t-text{font-family:var(--mono);font-size:12.5px;color:var(--dim);line-height:1.8;white-space:pre-wrap}

/* ── FILTER BAR ── */
.filter-bar{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:18px}
.f-chip{
  background:var(--s2);border:1px solid var(--border);border-radius:20px;
  color:var(--muted);cursor:pointer;font-size:11.5px;padding:5px 13px;transition:all .15s;
  -webkit-tap-highlight-color:transparent;
}
.f-chip:hover{border-color:var(--border2);color:var(--text)}
.f-chip.on{background:rgba(139,114,255,.15);border-color:var(--purple);color:var(--purple)}

/* ── SKILL CARDS ── */
.sk-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:12px}
.sk-card{
  background:var(--s1);border:1px solid var(--border);border-radius:14px;
  padding:16px;display:flex;flex-direction:column;gap:10px;
  transition:border-color .15s;
}
.sk-card:hover{border-color:var(--border2)}
.sk-head{display:flex;align-items:flex-start;gap:10px}
.sk-info{flex:1;min-width:0}
.sk-icon{width:38px;height:38px;border-radius:9px;background:rgba(224,96,176,.12);border:1px solid rgba(224,96,176,.2);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.sk-name{font-size:13.5px;font-weight:600;margin-bottom:4px;line-height:1.3}
.sk-source{font-size:11px;color:var(--muted)}
.sk-installs{margin-left:auto;font-size:11px;font-weight:700;color:var(--pink);white-space:nowrap;padding-top:2px}
.sk-cmd{
  background:var(--bg);border:1px solid var(--border2);border-radius:7px;
  padding:8px 11px;display:flex;align-items:center;gap:8px;
}
.sk-cmd-text{font-family:var(--mono);font-size:11.5px;color:#7ef5a0;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sk-footer{display:flex;align-items:center;justify-content:space-between}
.sk-link{color:var(--pink);font-size:11.5px;text-decoration:none}
.sk-link:hover{text-decoration:underline}

/* ── EMPTY / LOADING ── */
.empty{text-align:center;color:var(--muted);padding:60px 0;font-size:14px}
.source-link{font-size:11px;color:var(--blue);text-decoration:none}
.source-link:hover{text-decoration:underline}

/* ── SKILLS HEADER (desktop) ── */
.sk-header{display:flex;align-items:center;gap:12px;margin-bottom:18px}
.sk-search{width:320px}
.sk-header-note{font-size:12px;color:var(--muted)}

/* ── MOBILE ── */
@media(max-width:640px){
  /* Header */
  .header{padding:14px 16px 12px}
  .header-top{flex-wrap:wrap;gap:8px;margin-bottom:12px}
  .header-top .search-box{width:100%;order:3}
  .header-sub{font-size:11px;order:2}
  .logo{font-size:18px}

  /* Stat cards — 2 cols, 5th spans full width */
  .stat-row{grid-template-columns:repeat(2,1fr);gap:8px}
  .stat-card:last-child{grid-column:1/-1}
  .stat-num{font-size:22px}
  .stat-label{font-size:10px}
  .stat-icon{font-size:16px;right:10px;top:10px}
  .stat-card{padding:10px 12px}

  /* Main layout */
  .main{padding:12px 14px}
  .grid{grid-template-columns:1fr}
  .sk-grid{grid-template-columns:1fr}
  .ss-grid{grid-template-columns:repeat(2,1fr);gap:8px}

  /* Filter bar — horizontal scroll */
  .filter-bar{overflow-x:auto;flex-wrap:nowrap;padding-bottom:6px;margin-bottom:14px;-webkit-overflow-scrolling:touch;scrollbar-width:none}
  .filter-bar::-webkit-scrollbar{display:none}
  .f-chip{white-space:nowrap;flex-shrink:0;padding:7px 14px;font-size:12px}

  /* Tool cards */
  .card-top{padding:12px}
  .card-desc{padding:0 12px 12px;font-size:13px}
  .card-body{padding:12px}
  .chip{font-size:9px;padding:2px 6px}
  .copy-btn{padding:7px 12px;font-size:12px;min-width:60px}
  .install-cmd{font-size:11px}

  /* Skills section */
  .sk-header{flex-direction:column;align-items:stretch;gap:8px;margin-bottom:14px}
  .sk-search{width:100%!important}
  .sk-header-note{font-size:11px;text-align:center}
  .sk-card{padding:12px}
  .sk-head{gap:8px;flex-wrap:wrap}
  .sk-icon{width:34px;height:34px;font-size:13px;flex-shrink:0}
  .sk-name{font-size:13px}
  .sk-installs{font-size:10px;margin-left:auto}
  .sk-cmd{padding:8px 10px;gap:6px}
  .sk-cmd-text{font-size:11px}
  .sk-footer{margin-top:2px}

  /* Transcript panel — bottom sheet */
  .overlay{align-items:flex-end}
  .panel{border-radius:18px 18px 0 0;width:100%;max-height:88vh;position:fixed;bottom:0;left:0;right:0}
  .panel-head{padding:14px 16px}
  .panel-body{padding:14px 16px}
  .t-list .t-badge{display:none}
  .t-text{font-size:12px}

  /* Screenshots */
  .ss-name{font-size:10px;padding:6px 8px}
}
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div class="logo">AI Tools Reference</div>
    <div class="header-sub" id="header-sub">Loading…</div>
    <div class="search-box">
      <span class="icon">⌕</span>
      <input type="search" id="q" placeholder="Search tools, tags, descriptions…" autocomplete="off">
    </div>
  </div>
  <div class="stat-row">
    <div class="stat-card" style="--c1:var(--purple)" onclick="showSection('tools',this)">
      <div class="stat-num" id="n-tools">—</div>
      <div class="stat-label">Tools</div>
      <div class="stat-icon">🗂</div>
    </div>
    <div class="stat-card" style="--c1:var(--blue)" onclick="showSection('transcripts',this)">
      <div class="stat-num" id="n-trans">—</div>
      <div class="stat-label">Transcripts</div>
      <div class="stat-icon">📝</div>
    </div>
    <div class="stat-card" style="--c1:var(--teal)" onclick="showSection('screenshots',this)">
      <div class="stat-num" id="n-shots">—</div>
      <div class="stat-label">Screenshots</div>
      <div class="stat-icon">🖼</div>
    </div>
    <div class="stat-card" style="--c1:var(--green)" onclick="showSection('tools',this)">
      <div class="stat-num" id="n-cats">—</div>
      <div class="stat-label">Categories</div>
      <div class="stat-icon">🏷</div>
    </div>
    <div class="stat-card active" style="--c1:var(--pink)" onclick="showSection('skills',this)">
      <div class="stat-num">270+</div>
      <div class="stat-label">Live Skills</div>
      <div class="stat-icon">⚡</div>
    </div>
  </div>
</div>

<div class="main">

  <!-- TOOLS SECTION -->
  <div class="section" id="sec-tools">
    <div class="filter-bar" id="cat-filters"></div>
    <div class="grid" id="grid"><div class="empty">Loading tools…</div></div>
  </div>

  <!-- TRANSCRIPTS SECTION -->
  <div class="section" id="sec-transcripts">
    <div class="t-list" id="t-list"><div class="empty">Loading transcripts…</div></div>
  </div>

  <!-- SCREENSHOTS SECTION -->
  <div class="section" id="sec-screenshots">
    <div class="ss-grid" id="ss-grid"><div class="empty">Loading screenshots…</div></div>
  </div>

  <!-- SKILLS SECTION -->
  <div class="section active" id="sec-skills">
    <div class="sk-header">
      <div class="search-box sk-search">
        <span class="icon">⌕</span>
        <input type="search" id="sk-q" placeholder="Search skills.sh…" autocomplete="off">
      </div>
      <div class="sk-header-note">Live from <a href="https://skills.sh" target="_blank" rel="noopener" style="color:var(--pink);text-decoration:none">skills.sh</a> — browse only, no installs</div>
    </div>
    <div class="sk-grid" id="sk-grid"><div class="empty">Loading top skills…</div></div>
  </div>

</div>

<!-- TRANSCRIPT READER PANEL -->
<div class="overlay" id="overlay" onclick="if(event.target===this)closePanel()">
  <div class="panel">
    <div class="panel-head">
      <span class="panel-icon">📝</span>
      <div class="panel-title" id="p-title"></div>
      <button class="panel-close" onclick="closePanel()">✕</button>
    </div>
    <div class="panel-meta" id="p-meta"></div>
    <div class="panel-body"><div class="t-text" id="p-body"></div></div>
  </div>
</div>

<script>
const ICONS = {design:'🎨',animation:'✨','browser-automation':'🌐','document-conversion':'📄',networking:'🔗',media:'🎬','ai-video':'🎥','claude-workflow':'🤖','image-generation':'🖼️','image-processing':'📷','local-llm':'💻',other:'🔧'}
const TYPE_ICONS = {'ai-tool':'🤖','multimedia-tool':'🎬','tutorial':'📖','event':'📅','product':'📦','resource':'🔗','other':'📌'}

let tools=[], transcripts=[], screenshots=[], activeCat='all', openId=null
let skillsLoaded=true

async function load() {
  // Load independently so one failure doesn't block others
  const [t, tr, ss, st] = await Promise.all([
    fetch('/api/tools').then(r=>r.json()).catch(()=>[]),
    fetch('/api/transcripts').then(r=>r.json()).catch(()=>[]),
    fetch('/api/screenshots').then(r=>r.json()).catch(()=>[]),
    fetch('/api/stats').then(r=>r.json()).catch(()=>({})),
  ])
  tools=t; transcripts=tr; screenshots=ss

  document.getElementById('n-tools').textContent = st.tools||t.length
  document.getElementById('n-trans').textContent = st.transcripts||tr.length
  document.getElementById('n-shots').textContent = st.screenshots||ss.length
  document.getElementById('n-cats').textContent = st.categories||[...new Set(t.map(x=>x.category))].length
  const typeCount = [...new Set(t.map(x=>x.content_type||x.category))].length
  document.getElementById('header-sub').textContent = `${t.length} entries across ${typeCount} types`

  buildFilters()
  renderTools()
  renderTranscripts()
  renderScreenshots()
}

function showSection(name, card) {
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'))
  document.querySelectorAll('.stat-card').forEach(c=>c.classList.remove('active'))
  document.getElementById('sec-'+name).classList.add('active')
  card.classList.add('active')
  if(name==='tools') document.getElementById('q').focus()
  if(name==='skills' && !skillsLoaded) { skillsLoaded=true; loadSkills() }
}

async function loadSkills(q='') {
  const grid = document.getElementById('sk-grid')
  grid.innerHTML = '<div class="empty">Loading…</div>'
  const skills = await fetch('/api/skills'+(q?'?q='+encodeURIComponent(q):'')).then(r=>r.json()).catch(()=>[])
  renderSkills(skills)
}

function renderSkills(skills) {
  const grid = document.getElementById('sk-grid')
  if(!skills.length){grid.innerHTML='<div class="empty">No skills found.</div>';return}
  grid.innerHTML = skills.map((s,i) => {
    const fmt = s.installs>=1e6 ? (s.installs/1e6).toFixed(1)+'M' : s.installs>=1e3 ? Math.round(s.installs/1e3)+'K' : String(s.installs)
    const rank = i+1
    const rankColor = rank===1?'var(--orange)':rank<=3?'var(--teal)':rank<=10?'var(--purple)':'var(--muted)'
    return `<div class="sk-card">
  <div class="sk-head">
    <div class="sk-icon" style="font-size:13px;font-weight:800;color:${rankColor};font-family:var(--mono)">#${rank}</div>
    <div class="sk-info">
      <div class="sk-name">${x(s.name)}</div>
      <div class="sk-source">${x(s.source)}</div>
    </div>
    <div class="sk-installs">${fmt} installs</div>
  </div>
  ${s.description?`<div style="font-size:12.5px;color:var(--dim);line-height:1.6">${x(s.description)}</div>`:''}
  <div class="sk-cmd">
    <span class="sk-cmd-text">${x(s.installCmd)}</span>
    <button class="copy-btn" onclick="cp(event,'${jsq(s.installCmd)}')">Copy</button>
  </div>
  <div class="sk-footer">
    <a class="sk-link" href="${x(s.url)}" target="_blank" rel="noopener">↗ View on skills.sh</a>
  </div>
</div>`
  }).join('')
}

let skillsDebounce
document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('sk-q').addEventListener('input', e => {
    const q = e.target.value.trim()
    clearTimeout(skillsDebounce)
    skillsDebounce = setTimeout(() => loadSkills(q), 300)
  })
})

function buildFilters() {
  const groups = {}
  tools.forEach(t=>{
    const key = t.content_type || t.category
    groups[key] = (groups[key]||0)+1
  })
  const sorted = Object.entries(groups).sort((a,b)=>b[1]-a[1])
  document.getElementById('cat-filters').innerHTML =
    `<span class="f-chip on" onclick="filter('all',this)">All (${tools.length})</span>`
    + sorted.map(([c,n])=>`<span class="f-chip" onclick="filter('${jsq(c)}',this)">${TYPE_ICONS[c]||ICONS[c]||''} ${x(c)} (${n})</span>`).join('')
}

function filter(cat, el) {
  activeCat=cat
  document.querySelectorAll('.f-chip').forEach(c=>c.classList.remove('on'))
  el.classList.add('on')
  renderTools()
}

function renderTools() {
  const q = document.getElementById('q').value.toLowerCase()
  const shown = tools.filter(t=>{
    if(activeCat!=='all') {
      const key = t.content_type || t.category
      if(key!==activeCat) return false
    }
    if(!q) return true
    return [t.name,t.description,...(t.tags||[]),...(t.use_cases||[]),t.category,t.content_type,t.type].some(s=>s&&s.toLowerCase().includes(q))
  })
  document.getElementById('grid').innerHTML = shown.length
    ? shown.map(t=>cardHTML(t)).join('')
    : '<div class="empty">No tools match.</div>'
}

function cardHTML(t) {
  const open = openId===t.id
  const ts = t.transcriptSlug
  return `<div class="card${open?' open':''}" id="card-${t.id}" onclick="toggle('${jsq(t.id)}')">
  <div class="card-top">
    <div class="card-icon">${TYPE_ICONS[t.content_type]||ICONS[t.category]||'🔧'}</div>
    <div class="card-meta">
      <div class="card-name">${x(t.name)}</div>
      <div class="chips">
        ${t.content_type?`<span class="chip c-content">${x(t.content_type)}</span>`:''}
        <span class="chip c-cat">${x(t.category)}</span>
        ${t.type?`<span class="chip c-type">${x(t.type)}</span>`:''}
        ${t.status?`<span class="chip c-status">${x(t.status)}</span>`:''}
      </div>
    </div>
  </div>
  ${t.description?`<div class="card-desc">${x(t.description)}</div>`:''}
  <div class="card-body">
    ${t.install?`<div class="install-box"><span class="install-label">install</span><span class="install-cmd">${x(t.install)}</span><button class="copy-btn" onclick="cp(event,'${jsq(t.install)}')">Copy</button></div>`:''}
    ${t.works_with?.length?`<div><div class="detail-label">Works with</div><div class="tag-row">${t.works_with.map(w=>`<span class="works-chip">${x(w)}</span>`).join('')}</div></div>`:''}
    ${t.use_cases?.length?`<div><div class="detail-label">Use cases</div><ul class="use-cases">${t.use_cases.map(u=>`<li>${x(u)}</li>`).join('')}</ul></div>`:''}
    ${t.tags?.length?`<div class="tag-row">${t.tags.map(tg=>`<span class="tag">${x(tg)}</span>`).join('')}</div>`:''}
    ${t.link?`<a class="card-link" href="${x(t.link)}" target="_blank" rel="noopener" onclick="event.stopPropagation()">↗ ${x(t.link)}</a>`:''}
    ${t.notes?`<div class="notes-box">⚠ ${x(t.notes)}</div>`:''}
    ${ts?`<div class="transcript-link" onclick="openT(event,'${jsq(ts)}','${jsq(t.name)}')">📝 View source transcript</div>`:''}
  </div>
</div>`
}

function toggle(id) {
  openId = openId===id ? null : id
  renderTools()
  if(openId) setTimeout(()=>{
    const el=document.getElementById('card-'+id)
    if(el) el.scrollIntoView({behavior:'smooth',block:'nearest'})
  },60)
}

function renderTranscripts() {
  document.getElementById('t-list').innerHTML = transcripts.length
    ? transcripts.map(t=>`<div class="t-item" onclick="openT(null,'${jsq(t.slug)}','${jsq(t.title||t.slug)}')">
        <div class="t-dot"></div>
        <div class="t-info">
          <div class="t-title">${x(t.title||t.slug)}</div>
          <div class="t-sub">${x(t.channel)} · ${new Date(t.modified).toLocaleDateString()}</div>
        </div>
        <span class="t-badge">${t.words} words</span>
      </div>`).join('')
    : '<div class="empty">No transcripts yet. Send a YouTube link to the bot.</div>'
}

function renderScreenshots() {
  document.getElementById('ss-grid').innerHTML = screenshots.length
    ? screenshots.map(s=>`<div class="ss-card" onclick="window.open('/screenshots/'+encodeURIComponent('${jsq(s.filename)}'),'_blank')">
        <img src="/screenshots/${encodeURIComponent(s.filename)}" alt="${x(s.filename)}" loading="lazy">
        <div class="ss-name">${s.filename.replace(/[-_]/g,' ').replace(/\.\w+$/,'')}</div>
      </div>`).join('')
    : '<div class="empty">No screenshots yet. Send a photo to the bot with caption "ait".</div>'
}

async function openT(e, slug, title) {
  if(e) e.stopPropagation()
  document.getElementById('p-title').textContent = title
  document.getElementById('p-meta').innerHTML = ''
  document.getElementById('p-body').textContent = 'Loading…'
  document.getElementById('overlay').classList.add('open')
  const raw = await fetch('/api/transcripts/'+slug).then(r=>r.text()).catch(()=>'Error loading transcript.')
  const lines = raw.split('\n')
  const src = (lines.find(l=>l.startsWith('Source:'))||'').replace('Source: ','')
  const channel = (lines.find(l=>l.startsWith('Channel:'))||'').replace('Channel: ','')
  const body = lines.slice(4).join('\n').trim()
  document.getElementById('p-meta').innerHTML = [
    channel?`<span class="chip c-cat">${x(channel)}</span>`:'',
    src?`<a class="source-link chip c-type" href="${x(src)}" target="_blank" rel="noopener">↗ Source video</a>`:'',
  ].join('')
  document.getElementById('p-body').textContent = body
}

function closePanel() { document.getElementById('overlay').classList.remove('open') }

function cp(e, text) {
  e.stopPropagation()
  if (navigator.clipboard && window.isSecureContext) {
    navigator.clipboard.writeText(text).catch(()=>fallbackCopy(text))
  } else {
    fallbackCopy(text)
  }
  e.target.textContent='Copied!'
  setTimeout(()=>e.target.textContent='Copy',1500)
}
function fallbackCopy(text) {
  const ta = document.createElement('textarea')
  ta.value = text
  ta.style.cssText = 'position:fixed;left:-9999px;top:0;opacity:0'
  document.body.appendChild(ta)
  ta.focus(); ta.select()
  document.execCommand('copy')
  document.body.removeChild(ta)
}

function x(s){ const d=document.createElement('div');d.textContent=String(s||'');return d.innerHTML }
// Escape a value for safe use inside a SINGLE-quoted JS string within a DOUBLE-quoted HTML onclick attribute.
// Without this, names containing an apostrophe (e.g. "It's") break the inline handler — nothing clicks.
function jsq(s){ return String(s==null?'':s).replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/"/g,'&quot;').replace(/\r?\n/g,'\\n') }

// ── live refresh: poll every 8s, reload data if anything changed ──
let lastSnapshot = ''
async function poll() {
  try {
    const st = await fetch('/api/stats').then(r=>r.json()).catch(()=>null)
    if (!st) return
    const snap = JSON.stringify(st)
    if (snap === lastSnapshot) return
    lastSnapshot = snap
    const [t, tr, ss] = await Promise.all([
      fetch('/api/tools').then(r=>r.json()).catch(()=>tools),
      fetch('/api/transcripts').then(r=>r.json()).catch(()=>transcripts),
      fetch('/api/screenshots').then(r=>r.json()).catch(()=>screenshots),
    ])
    tools=t; transcripts=tr; screenshots=ss
    document.getElementById('n-tools').textContent = st.tools
    document.getElementById('n-trans').textContent = st.transcripts
    document.getElementById('n-shots').textContent = st.screenshots
    document.getElementById('n-cats').textContent = st.categories
    document.getElementById('header-sub').textContent = `${t.length} entries across ${[...new Set(t.map(x=>x.content_type||x.category))].length} types`
    buildFilters()
    renderTools()
    renderTranscripts()
    renderScreenshots()
    showToast(`Updated — ${st.tools} entries`)
  } catch(_) {}
}

function showToast(msg) {
  let t = document.getElementById('toast')
  if (!t) {
    t = document.createElement('div')
    t.id = 'toast'
    t.style.cssText = 'position:fixed;bottom:24px;right:24px;background:#1d2038;border:1px solid var(--purple);border-radius:10px;padding:10px 16px;font-size:13px;color:var(--purple);z-index:300;opacity:0;transition:opacity .3s;pointer-events:none'
    document.body.appendChild(t)
  }
  t.textContent = msg
  t.style.opacity = '1'
  clearTimeout(t._to)
  t._to = setTimeout(() => t.style.opacity = '0', 2500)
}

document.getElementById('q').addEventListener('input', () => {
  // The top-right search filters Tools. If another section is showing (e.g. Skills),
  // jump to Tools so the results are actually visible.
  const qEl = document.getElementById('q')
  if (qEl.value && !document.getElementById('sec-tools').classList.contains('active')) {
    const toolsCard = document.querySelector('.stat-card[onclick*="showSection(\'tools\'"]')
    showSection('tools', toolsCard)
  }
  renderTools()
})
document.addEventListener('keydown', e=>{ if(e.key==='Escape') closePanel() })
load().then(() => {
  lastSnapshot = JSON.stringify({tools:tools.length,transcripts:transcripts.length,screenshots:screenshots.length})
  setInterval(poll, 8000)
})
loadSkills()
</script>
